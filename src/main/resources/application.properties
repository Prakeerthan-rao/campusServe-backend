# Server
server.port=8080

# Database
spring.datasource.url=jdbc:mysql://localhost:3306/campus_service_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=Praxx@15
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA - create tables first, then run data.sql
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# IMPORTANT: defer data.sql until after Hibernate creates tables
spring.jpa.defer-datasource-initialization=true
spring.sql.init.mode=always
spring.sql.init.data-locations=classpath:data.sql

# JWT
jwt.secret=campus_service_super_secret_key_must_be_at_least_32_chars_long
jwt.expiration-ms=86400000